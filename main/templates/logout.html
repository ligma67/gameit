{% extends 'base.html' %}
{% block head %}
<title>Выход | Gameit</title>
{% endblock %}
{% block content %}
    <div style="vertical-align: middle; height: 100vh; display: flex; align-items: center; justify-content: space-around">
        
        <form style="vertical-align:middle;" method="post">
        {% csrf_token %}
        <div class="form-group mx-auto" style="max-width: 350px;">
            <button type="submit" class="btn btn-primary align-self-center">Выйти из аккаунта</button>
            <p>Текущий аккаунт: {{ user.username }}</p>
        </div>
        
        </form>
    </div>
{% endblock %}
