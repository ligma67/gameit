{% extends 'base.html' %}

{% block content %}
<div style="vertical-align: middle; height: 100vh; display: flex; align-items: center; justify-content: space-around">

    <form style="vertical-align:middle;" method="post">
        <h3>Вход в аккаунт</h3>
        {% csrf_token %}
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Никнейм</label>
            {{reg_form.username}}
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Пароль</label>
            {{reg_form.password}}
        </div>
        <div class="form-group mx-auto" style="max-width: 350px;padding-bottom: 10px;">
        <div class="form-group mx-auto" style="max-width: 350px; padding-bottom: 10px;">
            

        </div>
        {% if User_wrong_error %}
        <p style="color: #d74221;">{{ User_wrong_error }}</p>
        {% endif %}
            <button type="submit" class="btn btn-primary align-self-center">Войти</button><br>
            <a href="/register">Зарегистрироваться</a>

    </form>

</div>
{% endblock %}
