<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
   <!-- <link rel="stylesheet" href="style.css">-->
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brad" href="/">На главную</a>
        <div class="collapse navbar-collapse" id="navbarNav">
    
  </div>
    </nav>
    
    
    
    <div style="vertical-align: middle; height: 100vh; display: flex; align-items: center; justify-content: space-around">
        
        <form style="vertical-align:middle;" method="post">
            <h3>Авторизация</h3>
        {% csrf_token %}
        <div class="form-group mx-auto" style="max-width: 350px;padding-bottom: 10px;">

            {{reg_form.username}}
            

        </div>
        <div class="form-group mx-auto" style="max-width: 350px; padding-bottom: 10px;">
            {{reg_form.password}}
            
        </div>
        {% if User_wrong_error %}
              <p style="color: #d74221;">{{ User_wrong_error }}</p>
            {% endif %}
        <div class="form-group mx-auto" style="max-width: 350px;">
<button type="submit" class="btn btn-primary align-self-center">Войти</button><br>
<a href="/register">Зарегистрироваться</a>
        </div>
        
        </form>
        
    </div>
    
</body>
</html>
