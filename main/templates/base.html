{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    {% block head %}
    {% endblock %}

</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Gameit</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="games">Games</a>
        </li>
      </ul>
      {% if user.is_authenticated %}
        <a href="profile" class="btn btn-primary" role="button">Профиль</a>
      {% else %}
        <a href="login" class="btn btn-primary" role="button">Войти</a>
        <!--<a href="register" class="btn btn-secondary" role="button">Зарегистрироваться</a>-->
      {% endif %}
    </div>
  </div>
</nav>

<main class="container my-5">
    <div class="row">
        <div class="col-12">
            {% block content %}
            
            {% endblock %}
        </div>
    </div>
</main>
  
</body>
</html>
