{% load static %}
<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-white">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/mainstyle.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}
    {% endblock %}
</head>

<body class="min-h-screen bg-gray-950 text-gray-100 antialiased">

    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-8">
                <a class="text-xl font-black tracking-wider text-purple-500 hover:text-purple-400 transition" href="/">
                    Gameit
                </a>

                <ul class="flex items-center space-x-6 text-sm font-medium">
                    <li>
                        <a class="text-white hover:text-purple-400 transition" href="/">Home</a>
                    </li>
                    <li>
                        <a class="text-gray-400 hover:text-white transition" href="/games">Games</a>
                    </li>
                </ul>
            </div>

            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                <a href="/profile"
                    class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition shadow-lg shadow-purple-600/20">
                    Профиль
                </a>
                {% else %}
                <a href="/login"
                    class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition shadow-lg shadow-purple-600/20">
                    Войти
                </a>
                <!--
                    <a href="/register" class="bg-gray-800 hover:bg-gray-700 text-gray-200 text-sm font-medium px-4 py-2 rounded-lg transition border border-gray-700">
                        Зарегистрироваться
                    </a> 
                -->
                {% endif %}
            </div>

        </div>
    </nav>
    <main class="container mx-auto px-4 py-10">
        {% block content %}

        {% endblock %}
    </main>

</body>

</html>
